<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Ribir</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .ribir_container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }

        .ribir_canvas {
            display: block;
        }

        .ribir_canvas:focus {
            outline: none;
        }
    </style>
</head>

<body>
    <div class="ribir_container"></div>
    <script type="module">
        import init, { run } from "./web_wasm.js";
        async function startup() {
            await init();
            run();
        }
        await startup()
    </script>
</body>

</html>
